<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>2025 USA Congress Apportionment Diagram</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    .seat { stroke: #999; cursor: pointer; }
    .Democrat { fill: #1f77b4; }
    .Republican { fill: #d62728; }
    .Other { fill: grey; }
    .tooltip {
      position: absolute; background: white; border: 1px solid #999;
      padding: 5px; pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
    }
  </style>
</head>
<body>
  <h2>2025 USA Congress Apportionment Diagram</h2>
  <div id="chart"></div>
  <div class="tooltip" id="tooltip"></div>
  <script>
    const svgWidth = 800;
    const seatSize = 20;
    const seatsPerRow = 20;
    const tooltip = d3.select("#tooltip");
    const svg = d3.select("#chart").append("svg")
      .attr("width", svgWidth)
      .attr("height", 600);

    // Load from shared JSON URL or local file
    const dataUrl = 'https://unitedstates.github.io/congress-legislators/legislators-current.json';

    d3.json(dataUrl).then(members => {
      // Flatten to one entry per current term (active 2025), filter as needed
      const activeMembers = members.flatMap(m => 
        m.terms.filter(term => {
          // Term current if end >= 2025-01-01
          return new Date(term.end) >= new Date('2025-01-01');
        }).map(term => ({
          party: term.party || 'Other',
          state: term.state || 'Unknown',
          name: m.name.official_full || (m.name.first + ' ' + m.name.last),
          // Extra fields if needed:
          type: term.type || '',
          district: term.district || '',
          caucus: term.caucus || '', // present in some
          committees: term.committees || [] // add if you parse committees elsewhere
        }))
      );

      svg.selectAll("rect")
        .data(activeMembers)
        .join("rect")
        .attr("class", d => "seat " + d.party)
        .attr("width", seatSize - 2)
        .attr("height", seatSize - 2)
        .attr("x", (_, i) => (i % seatsPerRow) * seatSize + 20)
        .attr("y", (_, i) => Math.floor(i / seatsPerRow) * seatSize + 20)
        .on("mouseover", function(event, d) {
          tooltip.style("opacity", 1)
            .html(`<strong>${d.name}</strong><br/>State: ${d.state}<br/>Party: ${d.party}<br/>Type: ${d.type}<br/>District: ${d.district}<br/>Caucus: ${d.caucus || 'N/A'}`)
            .style("left", (event.pageX + 10) + "px")
            .style("top", (event.pageY - 30) + "px");
        })
        .on("mouseout", () => tooltip.style("opacity", 0));
    }).catch(error => {
      console.error('Failed to load members data:', error);
    });
  </script>
</body>
</html>
